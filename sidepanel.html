<!DOCTYPE html>
<html data-theme="dark">
<head>
  <meta charset="UTF-8">
  <title>AI Assistant</title>
  <style>
    :root[data-theme="dark"] {
      --bg: #1a1a1a;
      --bg-secondary: #252525;
      --bg-tertiary: #333;
      --text: #e0e0e0;
      --text-muted: #888;
      --border: #333;
      --message-bg: #2a2a2a;
      --message-border: #444;
      --input-bg: #1a1a1a;
      --code-bg: #1e1e1e;
    }
    :root[data-theme="light"] {
      --bg: #ffffff;
      --bg-secondary: #f8f9fa;
      --bg-tertiary: #e0e0e0;
      --text: #1a1a1a;
      --text-muted: #666;
      --border: #e0e0e0;
      --message-bg: #ffffff;
      --message-border: #e0e0e0;
      --input-bg: #ffffff;
      --code-bg: #f0f0f0;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; display: flex; flex-direction: column; height: 100vh; background: var(--bg-secondary); color: var(--text); }
    #header { background: var(--bg); color: var(--text); padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
    #header h1 { font-size: 14px; font-weight: 600; }
    #theme-btn { background: var(--bg-tertiary); color: var(--text); border: none; padding: 6px 10px; border-radius: 4px; cursor: pointer; font-size: 14px; }
    #theme-btn:hover { opacity: 0.8; }
    #export-btn { background: var(--bg-tertiary); color: var(--text); border: none; padding: 6px 10px; border-radius: 4px; cursor: pointer; font-size: 14px; }
    #export-btn:hover { opacity: 0.8; }
    #settings-btn { background: var(--bg-tertiary); color: var(--text); border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 12px; }
    #settings-btn:hover { opacity: 0.8; }
    #settings-panel { display: none; background: var(--bg-secondary); padding: 15px; border-bottom: 1px solid var(--border); }
    #settings-panel label { display: block; margin: 10px 0 5px; font-size: 12px; color: var(--text); font-weight: 500; }
    #settings-panel input, #settings-panel select { width: 100%; padding: 6px; border: 1px solid var(--border); border-radius: 4px; box-sizing: border-box; background: var(--input-bg); color: var(--text); font-size: 12px; }
    #settings-panel button { width: 100%; padding: 8px; margin-top: 10px; background: #0066cc; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 12px; }
    #settings-panel button:hover { background: #0052a3; }
    #settings-panel .checkbox-row { display: flex; align-items: center; gap: 8px; margin-top: 10px; }
    #settings-panel .checkbox-row input { width: auto; }
    #settings-panel .checkbox-row label { margin: 0; cursor: pointer; }
    #page-info { display: none; padding: 8px 15px; background: var(--bg-secondary); border-bottom: 1px solid var(--border); gap: 4px; flex-direction: column; }
    #page-info-row { display: flex; align-items: center; gap: 8px; }
    #page-info-text { flex: 1; min-width: 0; }
    #page-title { font-size: 12px; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: block; }
    #page-url { font-size: 11px; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: block; }
    #refresh-btn { background: var(--bg-tertiary); color: var(--text-muted); border: none; padding: 4px 8px; border-radius: 4px; cursor: pointer; font-size: 14px; flex-shrink: 0; }
    #refresh-btn:hover { opacity: 0.8; }
    #messages { flex: 1; overflow-y: auto; padding: 15px; }
    .message { margin-bottom: 12px; padding: 10px 12px; border-radius: 6px; font-size: 13px; line-height: 1.5; }
    .user { background: #0066cc; color: white; margin-left: 40px; }
    .assistant { background: var(--message-bg); margin-right: 40px; border: 1px solid var(--message-border); color: var(--text); }
    .error { background: #fff3cd; color: #856404; border: 1px solid #ffc107; }
    .action { background: #e8f5e9; color: #2e7d32; border: 1px solid #a5d6a7; font-size: 11px; font-family: monospace; }
    .loading { background: var(--message-bg); margin-right: 40px; border: 1px solid var(--message-border); display: flex; align-items: center; gap: 10px; }
    .loading-dots { display: flex; gap: 4px; }
    .loading-dots span { width: 6px; height: 6px; background: #0066cc; border-radius: 50%; animation: bounce 1.4s ease-in-out infinite; }
    .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
    .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; } 40% { transform: scale(1); opacity: 1; } }
    .loading-status { font-size: 12px; color: var(--text-muted); font-style: italic; }
    #input-area { display: flex; padding: 12px; background: var(--bg); border-top: 1px solid var(--border); gap: 8px; }
    #input { flex: 1; padding: 10px; border: 1px solid var(--border); border-radius: 4px; font-size: 13px; background: var(--input-bg); color: var(--text); }
    button { padding: 10px 16px; background: #0066cc; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 13px; font-weight: 500; }
    button:disabled { background: #ccc; cursor: not-allowed; }
    #send:hover { background: #0052a3; }

    /* Markdown rendering in assistant messages */
    .assistant h2, .assistant h3, .assistant h4 { margin: 8px 0 4px; }
    .assistant h2 { font-size: 15px; }
    .assistant h3 { font-size: 14px; }
    .assistant h4 { font-size: 13px; font-weight: 600; }
    .assistant p { margin: 4px 0; }
    .assistant ul, .assistant ol { margin: 4px 0 4px 20px; }
    .assistant li { margin: 2px 0; }
    .assistant strong { font-weight: 600; }
    .assistant code { background: var(--code-bg); padding: 1px 4px; border-radius: 3px; font-size: 12px; font-family: 'SF Mono', 'Consolas', monospace; }
    .assistant pre { background: var(--code-bg); color: var(--text); padding: 8px 10px; border-radius: 4px; overflow-x: auto; margin: 6px 0; }
    .assistant pre code { background: none; color: inherit; padding: 0; font-size: 12px; }
    .assistant hr { border: none; border-top: 1px solid var(--border); margin: 8px 0; }
    .assistant a { color: #0066cc; text-decoration: none; }
    .assistant a:hover { text-decoration: underline; }
    .assistant blockquote { border-left: 3px solid var(--border); padding-left: 10px; margin: 8px 0; color: var(--text-muted); }
    .assistant table { border-collapse: collapse; margin: 8px 0; }
    .assistant td { border: 1px solid var(--border); padding: 4px 8px; }
  </style>
</head>
<body>
  <div id="header">
    <h1>AI Assistant</h1>
    <div style="display: flex; gap: 8px;">
      <button id="theme-btn" title="Toggle theme">🌓</button>
      <button id="export-btn" title="Export conversation">📥</button>
      <button id="settings-btn">Settings</button>
    </div>
  </div>
  <div id="settings-panel">
    <label>Provider</label>
    <select id="provider">
      <option value="anthropic">Anthropic</option>
      <option value="openai">OpenAI</option>
      <option value="custom">Custom</option>
    </select>
    <label>Base URL</label>
    <input type="text" id="baseUrl" placeholder="https://api.anthropic.com">
    <label>API Key</label>
    <input type="password" id="apiKey" placeholder="Enter your API key">
    <label>Model</label>
    <input type="text" id="model" placeholder="claude-sonnet-4-5">
    <div class="checkbox-row">
      <input type="checkbox" id="toolUse">
      <label for="toolUse">Enable Tool Use</label>
    </div>
    <button id="save-settings">Save Settings</button>
  </div>
  <div id="page-info">
    <div id="page-info-row">
      <div id="page-info-text">
        <span id="page-title"></span>
        <span id="page-url"></span>
      </div>
      <button id="refresh-btn" title="Refresh page context &amp; screenshot">&#x21bb;</button>
    </div>
  </div>
  <div id="messages"></div>
  <div id="input-area">
    <input type="text" id="input" placeholder="Ask me anything...">
    <button id="send">Send</button>
  </div>
  <script src="sidepanel.js"></script>
</body>
</html>
