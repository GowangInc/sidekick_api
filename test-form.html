<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Form Test Page</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 600px; margin: 50px auto; padding: 20px; }
    h1 { color: #333; }
    form { background: #f5f5f5; padding: 20px; border-radius: 8px; }
    .field { margin-bottom: 15px; }
    label { display: block; margin-bottom: 5px; font-weight: bold; }
    input[type="text"], input[type="email"], textarea, select { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
    textarea { height: 80px; resize: vertical; }
    .checkbox-group, .radio-group { margin-left: 10px; }
    .checkbox-group label, .radio-group label { display: inline; font-weight: normal; margin-left: 5px; }
    button { background: #0066cc; color: white; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; }
    button:hover { background: #0052a3; }
    #result { margin-top: 20px; padding: 15px; background: #e8f5e9; border-radius: 4px; display: none; }
  </style>
</head>
<body>
  <h1>Test Form</h1>
  <form id="testForm">
    <div class="field">
      <label for="name">Name:</label>
      <input type="text" id="name" name="name" placeholder="Enter your name">
    </div>

    <div class="field">
      <label for="email">Email:</label>
      <input type="email" id="email" name="email" placeholder="your@email.com">
    </div>

    <div class="field">
      <label for="country">Country:</label>
      <select id="country" name="country">
        <option value="">Select a country</option>
        <option value="us">United States</option>
        <option value="uk">United Kingdom</option>
        <option value="ca">Canada</option>
        <option value="au">Australia</option>
      </select>
    </div>

    <div class="field">
      <label>Favorite Color:</label>
      <div class="radio-group">
        <input type="radio" id="red" name="color" value="red">
        <label for="red">Red</label><br>
        <input type="radio" id="blue" name="color" value="blue">
        <label for="blue">Blue</label><br>
        <input type="radio" id="green" name="color" value="green">
        <label for="green">Green</label>
      </div>
    </div>

    <div class="field">
      <label>Interests:</label>
      <div class="checkbox-group">
        <input type="checkbox" id="sports" name="interests" value="sports">
        <label for="sports">Sports</label><br>
        <input type="checkbox" id="music" name="interests" value="music">
        <label for="music">Music</label><br>
        <input type="checkbox" id="reading" name="interests" value="reading">
        <label for="reading">Reading</label>
      </div>
    </div>

    <div class="field">
      <label for="comments">Comments:</label>
      <textarea id="comments" name="comments" placeholder="Enter your comments here"></textarea>
    </div>

    <button type="submit">Submit Form</button>
  </form>

  <div id="result"></div>

  <script>
    document.getElementById('testForm').addEventListener('submit', (e) => {
      e.preventDefault();
      const formData = new FormData(e.target);
      const data = {};
      for (let [key, value] of formData.entries()) {
        if (data[key]) {
          data[key] = Array.isArray(data[key]) ? [...data[key], value] : [data[key], value];
        } else {
          data[key] = value;
        }
      }
      const result = document.getElementById('result');
      result.style.display = 'block';
      result.innerHTML = '<strong>Form Submitted!</strong><br><pre>' + JSON.stringify(data, null, 2) + '</pre>';
    });
  </script>
</body>
</html>
