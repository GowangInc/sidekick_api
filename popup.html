<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>AI Assistant Settings</title>
  <style>
    body { width: 350px; padding: 15px; font-family: system-ui; }
    h2 { margin: 0 0 15px 0; font-size: 16px; }
    label { display: block; margin: 10px 0 5px; font-size: 13px; font-weight: 500; }
    input, select { width: 100%; padding: 6px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
    button { width: 100%; padding: 8px; margin-top: 15px; background: #0066cc; color: white; border: none; border-radius: 4px; cursor: pointer; }
    button:hover { background: #0052a3; }
    .status { margin-top: 10px; padding: 8px; border-radius: 4px; font-size: 12px; display: none; }
    .status.success { background: #d4edda; color: #155724; display: block; }
    .status.error { background: #f8d7da; color: #721c24; display: block; }
  </style>
</head>
<body>
  <h2>AI Assistant Settings</h2>

  <label>Provider</label>
  <select id="provider">
    <option value="anthropic">Anthropic</option>
    <option value="openai">OpenAI</option>
    <option value="custom">Custom</option>
  </select>

  <label>Base URL</label>
  <input type="text" id="baseUrl" placeholder="https://api.anthropic.com">

  <label>API Key</label>
  <input type="password" id="apiKey" placeholder="Enter your API key">

  <label>Model</label>
  <input type="text" id="model" placeholder="claude-sonnet-4-5">

  <div style="margin-top: 12px; display: flex; align-items: center; gap: 8px;">
    <input type="checkbox" id="toolUse" style="width: auto;">
    <label for="toolUse" style="margin: 0; cursor: pointer;">Enable Tool Use (requires API support)</label>
  </div>

  <button id="save">Save Settings</button>
  <button id="openSidebar" style="background: #28a745; margin-top: 10px;">Open Sidebar</button>

  <div id="status" class="status"></div>

  <script src="popup.js"></script>
</body>
</html>
